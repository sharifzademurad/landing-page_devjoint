<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaTech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="#hero" class="skip-link">Əsas məzmuna keç</a>

    <header>
        <div class="header__top">
            <a href="#" class="header__logo header__link">NovaTech</a>

            <button class="header__toggle" id="menuToggle" aria-label="Menyunu aç/bağla" aria-expanded="false" aria-controls="mainNav">
                <span class="header__toggle-bar"></span>
                <span class="header__toggle-bar"></span>
                <span class="header__toggle-bar"></span>
            </button>
        </div>

        <nav id="mainNav" class="header__nav" aria-label="Əsas naviqasiya">
            <ul class="header__nav-list">
                <li><a href="#hero" class="header__nav-link header__link">Haqqımızda</a></li>
                <li><a href="#" class="header__nav-link header__link">Qalereya</a></li>
                <li><a href="#contact" class="header__nav-link header__link">Əlaqə</a></li>
            </ul>
        </nav>
    </header>

    <main id="hero">
        <section>
            <h1>Rəqəmsal Dünyada Sizin Güvənli Tərəfdaşınız</h1>
            <p>Biz biznesiniz üçün ən innovativ web və mobil həlləri sıfırdan hazırlayırıq.</p>
            <a href="#contact">Bizimlə Əlaqə</a>
        </section>
    </main>

    <section id="contact" class="contact">
        <h2 class="contact__title">Bizimlə Əlaqə</h2>

        <form id="contactForm" class="contact__form" novalidate>
            <div class="contact__form-group">
                <label for="name" class="contact__label">Ad Soyad</label>
                <input type="text" id="name" name="name" class="contact__input" aria-required="true" aria-describedby="nameError">
                <span class="contact__error" id="nameError" role="alert"></span>
            </div>

            <div class="contact__form-group">
                <label for="email" class="contact__label">E-poçt</label>
                <input type="text" id="email" name="email" class="contact__input" aria-required="true" aria-describedby="emailError">
                <span class="contact__error" id="emailError" role="alert"></span>
            </div>

            <div class="contact__form-group">
                <label for="message" class="contact__label">Mesaj</label>
                <textarea id="message" name="message" rows="4" class="contact__input" aria-required="true" aria-describedby="messageError"></textarea>
                <span class="contact__error" id="messageError" role="alert"></span>
            </div>

            <button type="submit" class="contact__button">Göndər</button>
            <p class="contact__success" id="formSuccess" role="status">Mesajınız göndərildi!</p>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 NovaTech. Bütün hüquqlar qorunur.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
