<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaTech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-top">
            <a href="#">NovaTech</a>

            <button class="menu-toggle" id="menuToggle" aria-label="Menyunu aç/bağla" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <nav id="mainNav">
            <ul>
                <li><a href="#hero">Haqqımızda</a></li>
                <li><a href="#">Qalereya</a></li>
                <li><a href="#contact">Əlaqə</a></li>
            </ul>
        </nav>
    </header>

    <main id="hero">
        <section>
            <h1>Rəqəmsal Dünyada Sizin Güvənli Tərəfdaşınız</h1>
            <p>Biz biznesiniz üçün ən innovativ web və mobil həlləri sıfırdan hazırlayırıq.</p>
            <a href="#contact">Bizimlə Əlaqə</a>
        </section>
    </main>

    <section id="contact">
        <h2>Bizimlə Əlaqə</h2>

        <form id="contactForm" novalidate>
            <div class="form-group">
                <label for="name">Ad Soyad</label>
                <input type="text" id="name" name="name">
                <span class="error-message" id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="email">E-poçt</label>
                <input type="text" id="email" name="email">
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="message">Mesaj</label>
                <textarea id="message" name="message" rows="4"></textarea>
                <span class="error-message" id="messageError"></span>
            </div>

            <button type="submit">Göndər</button>
            <p class="form-success" id="formSuccess">Mesajınız göndərildi!</p>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 NovaTech. Bütün hüquqlar qorunur.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
